services:
  otel-collector:
    profiles: [observability]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel/config.yaml:ro
    ports:
      - "4317:4317"   # gRPC receiver
    depends_on:
      - jaeger

  jaeger:
    profiles: [observability]
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14250:14250"  # gRPC for OTel collector → Jaeger

  sync:
    build: .
    env_file: .env
    environment:
      # Override the endpoint to point at the collector container
      - OTEL_EXPORTER_OTLP_ENDPOINT=otel-collector:4317
    depends_on:
      - otel-collector
    # Run once; restart manually or schedule via cron on the host.
    # To run on a schedule inside Docker, uncomment and adjust:
    # command: ["sh", "-c", "while true; do python sync.py; sleep 300; done"]
