name: Update CHANGELOG on PR

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  update-changelog:
    # Skip commits made by this workflow to avoid a re-trigger loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate next version (dry run)
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          major_string_token: "[MAJOR]"
          minor_string_token: "[MINOR]"
          patch_string_token: "[PATCH]"
          release_branches: main
          tag_prefix: v
          dry_run: true

      - name: Update CHANGELOG.md
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          CHANGELOG: ${{ steps.tag.outputs.changelog }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          export DATE

          python3 - <<'PYEOF'
          import re, os

          new_tag = os.environ['NEW_TAG']
          changelog_body = os.environ['CHANGELOG']
          date = os.environ['DATE']

          new_entry = f"## {new_tag} — {date}\n\n{changelog_body}\n\n"

          changelog_file = 'CHANGELOG.md'
          if os.path.exists(changelog_file):
              with open(changelog_file) as f:
                  content = f.read()
              # Remove any existing entry for this version so reruns are idempotent
              pattern = r'## ' + re.escape(new_tag) + r' —[^\n]*\n.*?(?=\n## |\Z)'
              content = re.sub(pattern, '', content, flags=re.DOTALL)
              header_end = content.find('\n')
              if header_end == -1:
                  new_content = content + '\n\n' + new_entry
              else:
                  header = content[:header_end + 1]
                  rest = content[header_end + 1:].lstrip('\n')
                  new_content = header + '\n' + new_entry + rest
          else:
              new_content = '# Changelog\n\n' + new_entry

          with open(changelog_file, 'w') as f:
              f.write(new_content)
          print(f"Updated CHANGELOG.md with entry for {new_tag}")
          PYEOF

      - name: Commit and push if changed
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          if git diff --cached --quiet; then
            echo "CHANGELOG already up to date"
          else
            git commit -m "chore: update CHANGELOG for upcoming ${NEW_TAG}"
            git push
          fi
