name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-release:
    # Skip commits made by this workflow (CHANGELOG updates) to avoid a re-trigger loop.
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          major_string_token: "[MAJOR]"
          minor_string_token: "[MINOR]"
          patch_string_token: "[PATCH]"
          release_branches: main
          tag_prefix: v

      - name: Update CHANGELOG.md
        env:
          NEW_TAG: ${{ steps.tag.outputs.new_tag }}
          CHANGELOG: ${{ steps.tag.outputs.changelog }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")

          # Write the new entry to a temp file (env vars handle special chars safely)
          {
            printf "## %s — %s\n\n" "$NEW_TAG" "$DATE"
            printf "%s\n\n" "$CHANGELOG"
          } > /tmp/new_entry.md

          if [ -f CHANGELOG.md ]; then
            # Preserve the "# Changelog" header on line 1, insert new entry after it
            head -1 CHANGELOG.md > /tmp/changelog_new.md
            printf "\n" >> /tmp/changelog_new.md
            cat /tmp/new_entry.md >> /tmp/changelog_new.md
            tail -n +2 CHANGELOG.md >> /tmp/changelog_new.md
            mv /tmp/changelog_new.md CHANGELOG.md
          else
            { printf "# Changelog\n\n"; cat /tmp/new_entry.md; } > CHANGELOG.md
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "chore: update CHANGELOG for ${NEW_TAG}"
          git push

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
