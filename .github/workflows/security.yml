name: Security

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # Run weekly even without a push so stale deps don't go unnoticed
    - cron: "0 8 * * 1"

jobs:
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --strict

  trivy:
    name: Trivy (container image scan)
    runs-on: ubuntu-latest
    permissions:
      # SARIF upload is free for public repos; remove this permission and the
      # upload step below if you make the repo private without GitHub Advanced Security.
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t mealie-ha-todo-sync:ci .

      - name: Run Trivy (table — visible in job log)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mealie-ha-todo-sync:ci
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"

      - name: Run Trivy (SARIF — uploads to Security tab)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mealie-ha-todo-sync:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"  # don't double-fail; first step already gates the job

      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
